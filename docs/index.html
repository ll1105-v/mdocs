<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 应用开发入门</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="一个用 Docsify 搭建的 AI 应用开发入门个人网站">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .sidebar > h1 {
      font-weight: 800;
      margin: 0 20px 16px;
      text-align: left;
    }

    .sidebar > h1 a {
      font-weight: 800;
      text-align: left;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'AI 应用开发入门',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      mermaidConfig: {
        startOnLoad: true,
        theme: 'default',
        querySelector: '.mermaid'
      }
    }
  </script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs'
    mermaid.initialize(window.$docsify.mermaidConfig)
    window.mermaid = mermaid
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//unpkg.com/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
</body>
</html>
